---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: echo-server-production
  namespace: argo
spec:
  destination:
    namespace: echo-server
    name: production
  project: default
  sources:
    - repoURL: oci://ghcr.io/naviteq/http-echo-server/http-echo-server
      path: .
      targetRevision: "~> 0"
      helm:
        valueFiles:
        - $values/deployment/values/sandbox.yaml
        - $values/deployment/values/prod.yaml
    - repoURL: https://github.com/naviteq/http-echo-server
      ref: values
      targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
