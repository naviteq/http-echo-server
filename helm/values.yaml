---
# Values for http-echo-server.
# This chart consumes naviteq-library-chart as a dependency and reduces its own
# templates to a single thin wrapper that includes `library.app`. Library
# defaults are imported via `import-values: [defaults]` in Chart.yaml — only
# override below what differs from the library's defaults.
#
# For the full set of available values, see:
#   https://github.com/naviteq/helm-library/blob/main/chart/README.md

## @section Image

image:
  registry: ghcr.io
  repository: naviteq/http-echo-server
  pullPolicy: IfNotPresent
  ## Defaults to .Chart.AppVersion when empty
  tag: ""

## @section Container ports
##
## The library default is containerPort 8080; the app listens on 5000.

ports:
  - name: http
    containerPort: 5000
    protocol: TCP

## @section Probes
##
## Library defaults disable probes (`enabled: false`). The pre-migration chart
## ran HTTP probes against / on the http port, so we re-enable them with the
## same shape here.

livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http

## @section Service

service:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: http

## @section Ingress
##
## Library uses `hostname` + `path` for the primary host, with `extraHosts[]`
## and `extraTls[]` available for multi-host. The pre-migration chart had a
## single example host disabled by default — we keep that shape.

ingress:
  enabled: false
  hostname: chart-example.local
  path: /
  pathType: ImplementationSpecific
  ingressClassName: ""
  annotations: {}
  tls: false

## @section Resources

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 128Mi

## @section Autoscaling
##
## Note the renamed targets:
##   targetCPUUtilizationPercentage -> targetCPU
##   targetMemoryUtilizationPercentage -> targetMemory

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 80
  targetMemory: 80

## @section PodDisruptionBudget (disabled)
##
## Library default is `pdb.create: true`. The pre-migration chart did not
## render a PDB, so we suppress it here to keep the helm template diff
## minimal. Enabling a PDB can be a follow-up change.

pdb:
  create: false

## @section ServiceAccount

serviceAccount:
  create: false
  annotations: {}
  name: ""

## @section Environment variables
##
## Library uses a map (key -> value), not the K8s list-of-{name,value} form
## used in the pre-migration chart.

envVars:
  DOWNWARD_PATH: "/etc/k8s"
  SERVER_PORT: "5000"

## @section Downward API volume
##
## Library renames `volumes` / `volumeMounts` to `extraVolumes` /
## `extraVolumeMounts`. Resource-field references must target the library's
## container name (= .Chart.Name = "http-echo-server"), not the old "primary"
## name used by the pre-migration deployment template.

extraVolumes:
  - name: downward
    downwardAPI:
      items:
        - path: name
          fieldRef:
            fieldPath: metadata.name
        - path: namespace
          fieldRef:
            fieldPath: metadata.namespace
        - path: uid
          fieldRef:
            fieldPath: metadata.uid
        - path: annotations
          fieldRef:
            fieldPath: metadata.annotations
        - path: labels
          fieldRef:
            fieldPath: metadata.labels
        - path: "limits.cpu.m"
          resourceFieldRef:
            containerName: http-echo-server
            resource: limits.cpu
            divisor: 1m
        - path: "requests.cpu.m"
          resourceFieldRef:
            containerName: http-echo-server
            resource: requests.cpu
            divisor: 1m
        - path: "limits.memory.Mi"
          resourceFieldRef:
            containerName: http-echo-server
            resource: limits.memory
            divisor: 1Mi
        - path: "requests.memory.Mi"
          resourceFieldRef:
            containerName: http-echo-server
            resource: requests.memory
            divisor: 1Mi
        - path: "limits.hugepages-*.Gi"
          resourceFieldRef:
            containerName: http-echo-server
            resource: "limits.hugepages-*"
            divisor: 1Gi
        - path: "requests.hugepages-*.Gi"
          resourceFieldRef:
            containerName: http-echo-server
            resource: "requests.hugepages-*"
            divisor: 1Gi
        - path: "limits.ephemeral-storage.Gi"
          resourceFieldRef:
            containerName: http-echo-server
            resource: limits.ephemeral-storage
            divisor: 1Gi
        - path: "requests.ephemeral-storage.Gi"
          resourceFieldRef:
            containerName: http-echo-server
            resource: requests.ephemeral-storage
            divisor: 1Gi

extraVolumeMounts:
  - name: downward
    mountPath: /etc/k8s
    readOnly: true

## @section Security contexts
##
## Pod-level: library wraps this with an `enabled` toggle (default off).
## Container-level: renamed from `securityContext` to `containerSecurityContext`.

podSecurityContext:
  enabled: false
  # fsGroup: 2000

containerSecurityContext:
  enabled: false
  # runAsUser: 1000
  # runAsNonRoot: true

## @section Pod labels and annotations

podAnnotations: {}
podLabels: {}

## @section Scheduling

nodeSelector: {}
tolerations: []
affinity: {}
